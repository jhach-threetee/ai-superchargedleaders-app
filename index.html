<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Expert Prompt Generator</title>
    <style>
        :root {
            --primary: #1F4F98;
            --navy: #0C2867;
            --accent: #F4C744;
            --white: #FFFFFF;
        }
        
        * { box-sizing: border-box; }
        
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--navy); overflow: hidden;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; color: var(--white); display: flex; justify-content: center; }
        
        .app-wrapper {
            display: flex; flex-direction: row; gap: 20px; width: 100%; max-width: 1100px;
            height: 100vh; padding: 20px; box-sizing: border-box;
        }

        /* Desktop Independent Scrolling */
        .input-section {
            flex: 1.2; display: flex; flex-direction: column; gap: 10px;
            overflow-y: auto; padding-right: 15px; height: 100%;
        }

        .preview-section {
            flex: 0.8; background: rgba(255, 255, 255, 0.08); padding: 20px;
            border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex; flex-direction: column; height: 100%; box-sizing: border-box;
        }

        h3 { font-size: 0.85rem; margin: 15px 0 5px 0; color: var(--accent); border-bottom: 1px solid rgba(244, 199, 68, 0.2); padding-bottom: 3px; text-transform: uppercase; }
        
        .field-group { display: flex; flex-direction: column; gap: 5px; margin-top: 8px; width: 100%; }
        .row-group { display: flex; align-items: flex-start; gap: 10px; margin-top: 8px; width: 100%; }
        
        .flex-row { display: flex; gap: 10px; width: 100%; }
        .flex-item { flex: 1; }

        .checkbox-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 10px; width: 100%; }
        .checkbox-item { display: flex; align-items: center; gap: 6px; white-space: nowrap; font-size: 0.8rem; }

        label { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.9; }
        .hint { font-size: 0.65rem; opacity: 0.7; font-weight: normal; font-style: italic; margin-bottom: 2px; display: block;}
        
        select, textarea, input[type="text"] { 
            width: 100%; padding: 10px; border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 6px; font-size: 0.9rem; background: var(--white); color: var(--navy); font-family: inherit;
        }

        input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
        .hidden-field { display: none; margin-top: 5px; width: 100%; }

        .prompt-header { font-size: 0.7rem; font-weight: bold; color: var(--accent); margin-bottom: 10px; border-bottom: 1px solid rgba(244, 199, 68, 0.3); padding-bottom: 5px; }
        
        #output { font-size: 0.85rem; line-height: 1.5; color: var(--white); white-space: pre-wrap; overflow-y: auto; flex-grow: 1; margin-bottom: 15px; padding-right: 5px; }

        .copy-btn { background-color: var(--accent); color: var(--navy); border: none; padding: 14px; font-weight: 800; border-radius: 6px; cursor: pointer; transition: 0.3s; font-size: 0.85rem; text-transform: uppercase; flex-shrink: 0; }
        .copy-btn:hover { background-color: #FFFFFF; }

        .input-section::-webkit-scrollbar, #output::-webkit-scrollbar { width: 6px; }
        .input-section::-webkit-scrollbar-thumb, #output::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        /* Mobile Fix */
        @media (max-width: 800px) {
            .app-wrapper { flex-direction: column; overflow: hidden; height: 100vh; padding: 10px; gap: 10px; }
            .input-section { flex: 1; height: 50%; min-width: 100%; padding-right: 5px; border-bottom: 1px solid rgba(255,255,255,0.1); }
            .preview-section { flex: 1; height: 50%; min-width: 100%; margin-top: 0; }
            .flex-row { flex-direction: column; }
            .checkbox-grid { flex-direction: row; gap: 8px; }
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="input-section">
        <div class="field-group">
            <label>Expert Role</label>
            <select id="roleSelector" onchange="renderRoleUI()">
                <option value="Management Consultant" selected>Management Consultant</option>
                <option value="Film Director">Film Director</option>
                <option value="Translator">Translator</option>
                <option value="Talent Acquisition Specialist">Talent Acquisition Specialist</option>
                <option value="Communication Coach">Communication Coach</option>
                <option value="Brand/Marketing Specialist">Brand/Marketing Specialist</option>
                <option value="Other">Other (General Purpose)</option>
            </select>
        </div>
        <div id="roleFields"></div>
    </div>

    <div class="preview-section">
        <div class="prompt-header">Generated Prompt</div>
        <div id="output">Fill the fields to generate...</div>
        <button class="copy-btn" onclick="copyPrompt()">Copy to Clipboard</button>
    </div>
</div>

<textarea id="tempCopyArea" style="position:absolute; left:-9999px;"></textarea>

<script>
    function getV(id) { const el = document.getElementById(id); return el ? el.value : ""; }
    function isC(id) { const el = document.getElementById(id); return el ? el.checked : false; }

    function toggleField(checkboxId, targetId) {
        const cb = document.getElementById(checkboxId);
        const target = document.getElementById(targetId);
        if (target) target.style.display = cb.checked ? "block" : "none";
        generatePrompt();
    }

    function toggleSelectOther(selectId, targetId) {
        const sel = document.getElementById(selectId);
        const target = document.getElementById(targetId);
        if (target) target.style.display = sel.value === "Other" ? "block" : "none";
        generatePrompt();
    }

    function updateConsultantFrameworks() {
        const obj = getV('mcObjective');
        const frameworkSel = document.getElementById('mcFramework');
        const condSection = document.getElementById('mcConditionalFields');
        if(!frameworkSel || !condSection) return;
        
        let options = [];
        let condHTML = "";

        if (obj === "Market Analysis") {
            options = ["Porter's Five Forces", "PESTEL Analysis", "SWOT Analysis", "Consumer Persona Profile"];
            condHTML = `
                <div class="field-group">
                    <label id="labelCond1">Competitive Landscape</label>
                    <textarea id="mcCond1" rows="2" placeholder="List top competitors..." oninput="generatePrompt()"></textarea>
                </div>
                <div class="field-group">
                    <label id="labelCond2">Target Demographics</label>
                    <textarea id="mcCond2" rows="2" placeholder="Detail demographic profiles..." oninput="generatePrompt()"></textarea>
                </div>`;
        } else if (obj === "Profitability") {
            options = ["Profit Tree (Revenue/Cost)", "Value Chain Analysis", "EBITDA Lever Map"];
            condHTML = `
                <div class="field-group">
                    <label id="labelCond1">Revenue Streams</label>
                    <input type="text" id="mcCond1" placeholder="e.g. SaaS, Hardware..." oninput="generatePrompt()">
                </div>
                <div class="field-group">
                    <label id="labelCond2">Cost Structure</label>
                    <input type="text" id="mcCond2" placeholder="Fixed vs Variable..." oninput="generatePrompt()">
                </div>`;
        } else if (obj === "Market Entry") {
            options = ["3C’s Model", "Ansoff Matrix", "Blue Ocean Strategy"];
            condHTML = `
                <div class="field-group">
                    <label id="labelCond1">Barriers to Entry</label>
                    <input type="text" id="mcCond1" placeholder="Regulatory, Capital..." oninput="generatePrompt()">
                </div>`;
        } else if (obj === "Operational Excellence") {
            options = ["McKinsey 7-S Framework", "Lean Six Sigma Map", "Process Bottleneck Analysis"];
            condHTML = `
                <div class="field-group">
                    <label id="labelCond1">Known Bottlenecks</label>
                    <textarea id="mcCond1" rows="2" placeholder="e.g. Legacy systems..." oninput="generatePrompt()"></textarea>
                </div>`;
        }

        frameworkSel.innerHTML = options.map(o => `<option value="${o}">${o}</option>`).join('') + `<option value="Other">Other</option>`;
        condSection.innerHTML = condHTML;
        generatePrompt();
    }

    function renderRoleUI() {
        const role = document.getElementById('roleSelector').value;
        const container = document.getElementById('roleFields');
        
        if (role === "Film Director") {
            container.innerHTML = `
                <h3>Cinematography</h3>
                <div class="field-group">
                    <label>Shot Type / Angle</label>
                    <select id="shotType" onchange="toggleSelectOther('shotType', 'shotTypeOther')">
                        <option value="Wide Shot (Establishing context)">Wide Shot</option>
                        <option value="Medium Shot (Standard interaction)">Medium Shot</option>
                        <option value="Close-up (Emotional impact)">Close-up</option>
                        <option value="Low Angle (Power/Authority)">Low Angle</option>
                        <option value="High Angle (Overview/Vulnerability)">High Angle</option>
                        <option value="Bird’s Eye View (Strategy/Scale)">Bird’s Eye View</option>
                        <option value="Other">Other</option>
                    </select>
                    <input type="text" id="shotTypeOther" class="hidden-field" placeholder="Specify custom angle..." oninput="generatePrompt()">
                </div>
                <div class="row-group">
                    <input type="checkbox" id="camMoveCheck" onchange="toggleField('camMoveCheck', 'camMoveInput')">
                    <label>Include Camera Movement?</label>
                </div>
                <div id="camMoveInput" class="hidden-field">
                    <input type="text" id="camMoveText" placeholder="e.g. Slow Dolly Zoom..." oninput="generatePrompt()">
                </div>
                <h3>Subject & Action</h3>
                <div class="field-group">
                    <label>Subject Description</label>
                    <span class="hint">[Who/What] - [Specific action] - [Expressions/gestures]</span>
                    <textarea id="subjectAction" rows="3" placeholder="CEO - Standing at window..." oninput="generatePrompt()"></textarea>
                </div>
                <h3>Environment</h3>
                <div class="field-group">
                    <label>Setting</label>
                    <select id="setting" onchange="toggleSelectOther('setting', 'settingOther')">
                        <option value="Minimalist Executive Suite">Minimalist Executive Suite</option>
                        <option value="High-tech Innovation Lab">High-tech Innovation Lab</option>
                        <option value="Futuristic Urban Skyline">Futuristic Urban Skyline</option>
                        <option value="Sustainable Green Campus">Sustainable Green Campus</option>
                        <option value="Industrial Factory Floor">Industrial Factory Floor</option>
                        <option value="Other">Other</option>
                    </select>
                    <input type="text" id="settingOther" class="hidden-field" placeholder="Specify setting..." oninput="generatePrompt()">
                </div>
                <div class="field-group">
                    <label>Time of Day</label>
                    <select id="timeOfDay" onchange="toggleSelectOther('timeOfDay', 'timeOther')">
                        <option value="Golden Hour (Warm/Aspirational)">Golden Hour</option>
                        <option value="Blue Hour (Cool/Sleek)">Blue Hour</option>
                        <option value="High Noon (Clear/Direct)">High Noon</option>
                        <option value="Night/Neon (Modern/Tech-focused)">Night/Neon</option>
                        <option value="Other">Other</option>
                    </select>
                    <input type="text" id="timeOther" class="hidden-field" placeholder="Specify custom time..." oninput="generatePrompt()">
                </div>
                <div class="field-group"><label>Background Details</label><input type="text" id="bgDetails" placeholder="Details..." oninput="generatePrompt()"></div>
                <h3>Style & Ambiance</h3>
                <div class="field-group">
                    <label>Aesthetic / Film Genre</label>
                    <select id="aesthetic" onchange="toggleSelectOther('aesthetic', 'aestheticOther')">
                        <option value="Cinematic Blockbuster">Cinematic Blockbuster</option>
                        <option value="Minimalist Tech">Minimalist Tech</option>
                        <option value="Corporate Noir">Corporate Noir</option>
                        <option value="National Geographic Documentary">National Geographic Documentary</option>
                        <option value="Retro-Futurism">Retro-Futurism</option>
                        <option value="Other">Other</option>
                    </select>
                    <input type="text" id="aestheticOther" class="hidden-field" placeholder="Genre..." oninput="generatePrompt()">
                </div>
                <div class="field-group">
                    <label>Lighting Style</label>
                    <select id="lighting" onchange="toggleSelectOther('lighting', 'lightingOther')">
                        <option value="Rembrandt Lighting (Classic/Moody)">Rembrandt</option>
                        <option value="Softbox (Clean/Professional)">Softbox</option>
                        <option value="High-Key (Bright/Optimistic)">High-Key</option>
                        <option value="Volumetric Lighting (Dramatic beams)">Volumetric</option>
                        <option value="Other">Other</option>
                    </select>
                    <input type="text" id="lightingOther" class="hidden-field" placeholder="Lighting..." oninput="generatePrompt()">
                </div>
                <div class="field-group">
                    <label>Color Palette</label>
                    <select id="color" onchange="toggleSelectOther('color', 'colorOther')">
                        <option value="Teal and Orange (Modern Cinema)">Teal and Orange</option>
                        <option value="Monochrome/Grayscale (Sophisticated)">Monochrome</option>
                        <option value="Deep Blues & Silvers (Trust/Tech)">Deep Blues & Silvers</option>
                        <option value="Earth Tones (Sustainability/Human)">Earth Tones</option>
                        <option value="Other">Other</option>
                    </select>
                    <input type="text" id="colorOther" class="hidden-field" placeholder="Color..." oninput="generatePrompt()">
                </div>
                <h3>Audio (Optional)</h3>
                <div class="row-group">
                    <input type="checkbox" id="audioCheck" onchange="toggleField('audioCheck', 'audioFields')">
                    <label>Include Audio?</label>
                </div>
                <div id="audioFields" class="hidden-field">
                    <div class="field-group">
                        <label>Dialogue</label>
                        <select id="dialogue" onchange="toggleSelectOther('dialogue', 'dialogueOther')">
                            <option value="Internal Monologue">Internal Monologue</option>
                            <option value="Direct Address">Direct Address</option>
                            <option value="Muffled background chatter">Muffled chatter</option>
                            <option value="No dialogue">No dialogue</option>
                            <option value="Other">Other</option>
                        </select>
                        <input type="text" id="dialogueOther" class="hidden-field" placeholder="Specify..." oninput="generatePrompt()">
                    </div>
                    <div class="field-group"><label>Ambience</label><input type="text" id="ambient" placeholder="e.g. Low hum..." oninput="generatePrompt()"></div>
                    <div class="field-group"><label>Music</label><input type="text" id="music" placeholder="e.g. Synth..." oninput="generatePrompt()"></div>
                </div>
                <h3>Negative Prompt</h3>
                <div class="checkbox-grid">
                    <div class="checkbox-item"><input type="checkbox" class="neg-check" value="no subtitles" onchange="generatePrompt()">No Subtitles</div>
                    <div class="checkbox-item"><input type="checkbox" class="neg-check" value="no text" onchange="generatePrompt()">No Text</div>
                    <div class="checkbox-item"><input type="checkbox" class="neg-check" value="no watermarks" onchange="generatePrompt()">No Watermarks</div>
                    <div class="checkbox-item"><input type="checkbox" class="neg-check" value="no distorted faces" onchange="generatePrompt()">No Distortion</div>
                    <div class="checkbox-item"><input type="checkbox" id="negOtherCheck" onchange="toggleField('negOtherCheck', 'negOtherInput')"><label>Other</label></div>
                </div>
                <input type="text" id="negOtherInput" class="hidden-field" placeholder="Specify exclusions..." oninput="generatePrompt()">`;
        } else if (role === "Translator") {
            container.innerHTML = `
                <h3>Languages</h3>
                <div class="flex-row">
                    <div class="field-group flex-item"><label>Source Language</label><input type="text" id="sourceLang" placeholder="e.g. French..." oninput="generatePrompt()"></div>
                    <div class="field-group flex-item"><label>Target Language</label><input type="text" id="targetLang" placeholder="e.g. Spanish..." oninput="generatePrompt()"></div>
                </div>
                <h3>Specifications</h3>
                <div class="field-group">
                    <label>Tone & Intent</label>
                    <select id="transTone" onchange="toggleSelectOther('transTone', 'transToneOther')">
                        <option value="Professional">Professional</option>
                        <option value="Literal">Literal</option>
                        <option value="Creative">Creative</option>
                        <option value="Formal">Formal</option>
                        <option value="Other">Other</option>
                    </select>
                    <input type="text" id="transToneOther" class="hidden-field" placeholder="Tone..." oninput="generatePrompt()">
                </div>
                <div class="field-group">
                    <label>Material Type</label>
                    <select id="transMaterial" onchange="toggleSelectOther('transMaterial', 'transMaterialOther')">
                        <option value="Legal Contract">Legal Contract</option>
                        <option value="Marketing Copy">Marketing Copy</option>
                        <option value="Technical Manual">Technical Manual</option>
                        <option value="Internal Email">Internal Email</option>
                        <option value="Other">Other</option>
                    </select>
                    <input type="text" id="transMaterialOther" class="hidden-field" placeholder="Material..." oninput="generatePrompt()">
                </div>
                <h3>Context & Nuance</h3>
                <div class="field-group"><label>Usage Context</label><textarea id="transContext" rows="3" placeholder="Keynote, negotiation..." oninput="generatePrompt()"></textarea></div>
                <div class="checkbox-grid">
                    <div class="checkbox-item"><input type="checkbox" id="checkNuance" onchange="generatePrompt()"><label>Include Nuance Report</label></div>
                    <div class="checkbox-item"><input type="checkbox" id="checkProtect" onchange="toggleField('checkProtect', 'inputProtect')"><label>Terminology Protection</label></div>
                </div>
                <input type="text" id="inputProtect" class="hidden-field" placeholder="Protected terms..." oninput="generatePrompt()">
                <h3>Source Text</h3>
                <div class="field-group"><textarea id="transSource" rows="6" placeholder="Paste text here..." oninput="generatePrompt()"></textarea></div>`;
        } else if (role === "Management Consultant") {
            container.innerHTML = `
                <h3>Strategy & Scope</h3>
                <div class="field-group">
                    <label>Strategic Objective</label>
                    <select id="mcObjective" onchange="updateConsultantFrameworks()">
                        <option value="Market Analysis">Market Analysis</option>
                        <option value="Profitability">Profitability</option>
                        <option value="Market Entry">Market Entry</option>
                        <option value="Operational Excellence">Operational Excellence</option>
                    </select>
                </div>
                <div class="field-group">
                    <label>Consulting Framework</label>
                    <select id="mcFramework" onchange="toggleSelectOther('mcFramework', 'mcFrameworkOther')"></select>
                    <input type="text" id="mcFrameworkOther" class="hidden-field" placeholder="Custom Framework..." oninput="generatePrompt()">
                </div>
                <h3>Context & Expert Data</h3>
                <div class="field-group"><label>Business Problem</label><textarea id="mcContext" rows="4" placeholder="Business challenge..." oninput="generatePrompt()"></textarea></div>
                <div id="mcConditionalFields"></div>
                <h3>Task Customization</h3>
                <div class="row-group">
                    <input type="checkbox" id="checkCustomTask" onchange="toggleField('checkCustomTask', 'inputCustomTask')">
                    <label>Override Standard Task?</label>
                </div>
                <div id="inputCustomTask" class="hidden-field">
                    <textarea id="mcCustomTaskText" rows="3" placeholder="Custom instructions..." oninput="generatePrompt()"></textarea>
                </div>
                <h3>Output Settings</h3>
                <div class="field-group">
                    <label>Target Deliverable</label>
                    <select id="mcDeliverable" onchange="toggleSelectOther('mcDeliverable', 'mcDeliverableOther')">
                        <option value="Executive Memo (1-page)">Executive Memo (1-page)</option>
                        <option value="Board Presentation Outline">Board Presentation Outline</option>
                        <option value="1-year and 5-year plan">1-year and 5-year plan</option>
                        <option value="30-60-90 Day Roadmap">30-60-90 Day Roadmap</option>
                        <option value="Risk Assessment Matrix">Risk Assessment Matrix</option>
                        <option value="Other">Other</option>
                    </select>
                    <input type="text" id="mcDeliverableOther" class="hidden-field" placeholder="Custom deliverable..." oninput="generatePrompt()">
                </div>`;
            updateConsultantFrameworks();
        } else if (role === "Talent Acquisition Specialist") {
            container.innerHTML = `
                <h3>Position Fundamentals</h3>
                <div class="field-group"><label>Job Title</label><input type="text" id="taJobTitle" placeholder="e.g. CTO" oninput="generatePrompt()"></div>
                <div class="field-group">
                    <label>Seniority Level</label>
                    <select id="taSeniority" onchange="generatePrompt()">
                        <option value="Entry">Entry</option>
                        <option value="Mid-Level">Mid-Level</option>
                        <option value="Senior">Senior</option>
                        <option value="Director">Director</option>
                        <option value="C-Suite">C-Suite</option>
                    </select>
                </div>
                <div class="field-group"><label>Industry</label><input type="text" id="taIndustry" placeholder="Fintech, Biotech..." oninput="generatePrompt()"></div>
                <h3>The Mandate</h3>
                <div class="field-group">
                    <label>Primary Objective</label>
                    <select id="taObjective" onchange="toggleSelectOther('taObjective', 'taObjectiveOther')">
                        <option value="Create High-Impact Job Description">Create High-Impact Job Description</option>
                        <option value="Draft Executive Outreach (Headhunting)">Draft Executive Outreach (Headhunting)</option>
                        <option value="Generate Candidate Evaluation Rubric">Generate Candidate Evaluation Rubric</option>
                        <option value="Other">Other</option>
                    </select>
                    <input type="text" id="taObjectiveOther" class="hidden-field" placeholder="Custom mandate..." oninput="generatePrompt()">
                </div>
                <h3>DNA & Context</h3>
                <div class="field-group"><label>Must-Have Qualifications</label><textarea id="taQuals" rows="3" placeholder="Expertise, track record..." oninput="generatePrompt()"></textarea></div>
                <div class="field-group">
                    <label>Company Culture</label>
                    <select id="taCulture" onchange="toggleSelectOther('taCulture', 'taCultureOther')">
                        <option value="High-Growth & Agile">High-Growth & Agile</option>
                        <option value="Corporate & Structured">Corporate & Structured</option>
                        <option value="Mission-Driven & Impactful">Mission-Driven & Impactful</option>
                        <option value="Creative & Experimental">Creative & Experimental</option>
                        <option value="Other">Other</option>
                    </select>
                    <input type="text" id="taCultureOther" class="hidden-field" placeholder="Describe culture..." oninput="generatePrompt()">
                </div>
                <div class="checkbox-grid">
                    <div class="checkbox-item"><input type="checkbox" id="checkComp" onchange="toggleField('checkComp', 'inputComp')"><label>Compensation</label></div>
                    <div class="checkbox-item"><input type="checkbox" id="checkLoc" onchange="toggleField('checkLoc', 'inputLoc')"><label>Location</label></div>
                    <div class="checkbox-item"><input type="checkbox" id="checkExtra" onchange="toggleField('checkExtra', 'inputExtra')"><label>Extra Info</label></div>
                </div>
                <input type="text" id="inputComp" class="hidden-field" placeholder="$150k - $180k" oninput="generatePrompt()">
                <input type="text" id="inputLoc" class="hidden-field" placeholder="Hybrid - NYC" oninput="generatePrompt()">
                <textarea id="inputExtra" class="hidden-field" rows="2" placeholder="Extra info..." oninput="generatePrompt()"></textarea>
                <h3>Output Style</h3>
                <div class="field-group">
                    <label>Recruitment Tone</label>
                    <select id="taTone" onchange="toggleSelectOther('taTone', 'taToneOther')">
                        <option value="Professional & Authoritative">Professional & Authoritative</option>
                        <option value="Welcoming & Human-Centric">Welcoming & Human-Centric</option>
                        <option value="Direct & Performance-Oriented">Direct & Performance-Oriented</option>
                        <option value="Other">Other</option>
                    </select>
                    <input type="text" id="taToneOther" class="hidden-field" placeholder="Tone..." oninput="generatePrompt()">
                </div>`;
        } else if (role === "Communication Coach") {
            container.innerHTML = `
                <h3>The Interaction</h3>
                <div class="field-group">
                    <label>Interaction Type (Venue)</label>
                    <select id="coachVenue" onchange="toggleSelectOther('coachVenue', 'coachVenueOther')">
                        <option value="Public Speaking: Stage, large audience, slides">Public Speaking</option>
                        <option value="The Boardroom: Formal, high-pressure, data-heavy">The Boardroom</option>
                        <option value="1-on-1 'Crucial Conversation': Sensitive, personal, high-emotion">1-on-1 'Crucial Conversation'</option>
                        <option value="Asynchronous: Email, Slack, LinkedIn, or Video Memo">Asynchronous</option>
                        <option value="Spontaneous/Q&A: Thinking on your feet">Spontaneous/Q&A</option>
                        <option value="Other">Other</option>
                    </select>
                    <input type="text" id="coachVenueOther" class="hidden-field" placeholder="Setting..." oninput="generatePrompt()">
                </div>
                <div class="field-group">
                    <label>Strategic Goal</label>
                    <select id="coachGoal" onchange="toggleSelectOther('coachGoal', 'coachGoalOther')">
                        <option value="Conflict Resolution">Conflict Resolution</option>
                        <option value="Inspiration/Vision">Inspiration/Vision</option>
                        <option value="Persuasion/Buy-in">Persuasion/Buy-in</option>
                        <option value="Other">Other</option>
                    </select>
                    <input type="text" id="coachGoalOther" class="hidden-field" placeholder="Goal..." oninput="generatePrompt()">
                </div>
                <div class="field-group"><label>Target Audience</label><input type="text" id="coachAudience" placeholder="Skeptical Board..." oninput="generatePrompt()"></div>
                <h3>Context & Nuance</h3>
                <div class="field-group"><label>The Situation</label><textarea id="coachSituation" rows="4" placeholder="Background..." oninput="generatePrompt()"></textarea></div>
                <div class="field-group">
                    <label>Desired Tone</label>
                    <select id="coachTone" onchange="toggleSelectOther('coachTone', 'coachToneOther')">
                        <option value="Warm & Relatable">Warm & Relatable</option>
                        <option value="Empathetic but Firm">Empathetic but Firm</option>
                        <option value="Persuasive & Visionary">Persuasive & Visionary</option>
                        <option value="Diplomatic & Neutral">Diplomatic & Neutral</option>
                        <option value="Assertive & Direct">Assertive & Direct</option>
                        <option value="Other">Other</option>
                    </select>
                    <input type="text" id="coachToneOther" class="hidden-field" placeholder="Tone..." oninput="generatePrompt()">
                </div>
                <h3>Coach's Focus</h3>
                <div class="checkbox-grid">
                    <div class="checkbox-item"><input type="checkbox" class="coach-focus" value="Script/Talking Points" onchange="generatePrompt()">Script/Talking Points</div>
                    <div class="checkbox-item"><input type="checkbox" class="coach-focus" value="Anticipate Pushback" onchange="generatePrompt()">Anticipate Pushback</div>
                    <div class="checkbox-item"><input type="checkbox" class="coach-focus" value="Advice on Non-Verbal Cues" onchange="generatePrompt()">Non-Verbal Advice</div>
                    <div class="checkbox-item"><input type="checkbox" id="coachExtraCheck" onchange="toggleField('coachExtraCheck', 'coachExtraInput')"><label>Extra Context</label></div>
                </div>
                <textarea id="coachExtraInput" class="hidden-field" rows="2" placeholder="Extra info for coach..." oninput="generatePrompt()"></textarea>`;
        } else if (role === "Brand/Marketing Specialist") {
            container.innerHTML = `
                <h3>Strategy & Mandate</h3>
                <div class="field-group">
                    <label>Strategic Mandate</label>
                    <select id="brandMandate" onchange="toggleSelectOther('brandMandate', 'brandMandateOther')">
                        <option value="Brand Positioning & Identity">Brand Positioning & Identity</option>
                        <option value="Go-To-Market (GTM) Strategy">Go-To-Market (GTM) Strategy</option>
                        <option value="Email Conversion Sequence">Email Conversion Sequence</option>
                        <option value="UVP (Unique Value Proposition)">UVP (Unique Value Proposition)</option>
                        <option value="Content & Social Media Strategy">Content & Social Media Strategy</option>
                        <option value="Ad Campaign Creative Brief">Ad Campaign Creative Brief</option>
                        <option value="Other">Other</option>
                    </select>
                    <input type="text" id="brandMandateOther" class="hidden-field" placeholder="Custom mandate..." oninput="generatePrompt()">
                </div>

                <h3>Target Audience Profiling</h3>
                <div class="checkbox-grid">
                    <div class="checkbox-item"><input type="checkbox" id="checkAudDemo" onchange="toggleField('checkAudDemo', 'inputAudDemo')"><label>Demographics</label></div>
                    <div class="checkbox-item"><input type="checkbox" id="checkAudGeo" onchange="toggleField('checkAudGeo', 'inputAudGeo')"><label>Geographic</label></div>
                    <div class="checkbox-item"><input type="checkbox" id="checkAudPsy" onchange="toggleField('checkAudPsy', 'inputAudPsy')"><label>Psychographics</label></div>
                    <div class="checkbox-item"><input type="checkbox" id="checkAudPain" onchange="toggleField('checkAudPain', 'inputAudPain')"><label>Pain Points</label></div>
                    <div class="checkbox-item"><input type="checkbox" id="checkAudAware" onchange="toggleField('checkAudAware', 'inputAudAware')"><label>Awareness Level</label></div>
                    <div class="checkbox-item"><input type="checkbox" id="checkAudOther" onchange="toggleField('checkAudOther', 'inputAudOther')"><label>Other</label></div>
                </div>
                <input type="text" id="inputAudDemo" class="hidden-field" placeholder="Age, job title, income..." oninput="generatePrompt()">
                <input type="text" id="inputAudGeo" class="hidden-field" placeholder="City, region, urban/rural..." oninput="generatePrompt()">
                <textarea id="inputAudPsy" class="hidden-field" rows="2" placeholder="Values, fears, aspirations..." oninput="generatePrompt()"></textarea>
                <textarea id="inputAudPain" class="hidden-field" rows="2" placeholder="What is the 'itch' they can't scratch?..." oninput="generatePrompt()"></textarea>
                <div id="inputAudAware" class="hidden-field" style="margin-top:5px;">
                    <select id="selectAudAware" onchange="generatePrompt()">
                        <option value="Unaware">Unaware</option>
                        <option value="Problem-aware">Problem-aware</option>
                        <option value="Solution-aware">Solution-aware</option>
                        <option value="Most-aware">Most-aware</option>
                    </select>
                </div>
                <input type="text" id="inputAudOther" class="hidden-field" placeholder="Additional audience details..." oninput="generatePrompt()">

                <h3>Product & Distribution</h3>
                <div class="field-group">
                    <label>Product / Service Description</label>
                    <textarea id="brandDesc" rows="3" placeholder="Describe what you are offering..." oninput="generatePrompt()"></textarea>
                </div>
                <div class="field-group">
                    <label>Primary Channel</label>
                    <select id="brandChannel" onchange="toggleSelectOther('brandChannel', 'brandChannelOther')">
                        <option value="Direct Channels: Producer sells directly to consumer (Website, direct sales, outlet)">Direct Channels</option>
                        <option value="Indirect Channels: Involves intermediaries (Wholesalers, distributors, retailers)">Indirect Channels</option>
                        <option value="Digital Channels: Online methods (Social media, SEO, email, influencers)">Digital Channels</option>
                        <option value="Traditional Channels: Conventional methods (Print, TV, radio, direct mail)">Traditional Channels</option>
                        <option value="Retail/Physical Channels: Brick-and-mortar (Supermarkets, franchises)">Retail/Physical Channels</option>
                        <option value="Other">Other</option>
                    </select>
                    <input type="text" id="brandChannelOther" class="hidden-field" placeholder="Specify channel..." oninput="generatePrompt()">
                </div>

                <h3>Tone & Add-ons</h3>
                <div class="field-group">
                    <label>Brand Tone</label>
                    <select id="brandTone" onchange="toggleSelectOther('brandTone', 'brandToneOther')">
                        <option value="Bold & Disruptive">Bold & Disruptive</option>
                        <option value="Elegant & Premium">Elegant & Premium</option>
                        <option value="Trustworthy & Educational">Trustworthy & Educational</option>
                        <option value="Playful & Irreverent">Playful & Irreverent</option>
                        <option value="Other">Other</option>
                    </select>
                    <input type="text" id="brandToneOther" class="hidden-field" placeholder="Custom tone..." oninput="generatePrompt()">
                </div>
                <div class="checkbox-grid">
                    <div class="checkbox-item"><input type="checkbox" id="checkUSP" onchange="toggleField('checkUSP', 'inputUSP')"><label>Include USP/UVP Context</label></div>
                    <div class="checkbox-item"><input type="checkbox" id="checkCompetitors" onchange="toggleField('checkCompetitors', 'inputCompetitors')"><label>Competitors</label></div>
                </div>
                <textarea id="inputUSP" class="hidden-field" rows="2" placeholder="Explain your edge/uniqueness..." oninput="generatePrompt()"></textarea>
                <input type="text" id="inputCompetitors" class="hidden-field" placeholder="List key competitors..." oninput="generatePrompt()">`;
        } else if (role === "Other") {
            container.innerHTML = `
                <h3>The Fundamentals</h3>
                <div class="field-group"><label>Acting Role</label><input type="text" id="customRole" placeholder="Role..." oninput="generatePrompt()"></div>
                <div class="field-group"><label>Context</label><textarea id="customContext" rows="3" placeholder="Describe situation..." oninput="generatePrompt()"></textarea></div>
                <div class="field-group"><label>Task</label><textarea id="customTask" rows="3" placeholder="Specific action..." oninput="generatePrompt()"></textarea></div>
                <h3>Strategic Levers</h3>
                <div class="row-group"><input type="checkbox" id="checkAudience" onchange="toggleField('checkAudience', 'inputAudience')"><label>Target Audience</label></div>
                <input type="text" id="inputAudience" class="hidden-field" placeholder="Who is the end user?" oninput="generatePrompt()">
                <div class="row-group"><input type="checkbox" id="checkConstraints" onchange="toggleField('checkConstraints', 'inputConstraints')"><label>Constraints</label></div>
                <input type="text" id="inputConstraints" class="hidden-field" placeholder="No-go zones..." oninput="generatePrompt()">
                <div class="row-group"><input type="checkbox" id="checkFormat" onchange="toggleField('checkFormat', 'inputFormat')"><label>Format</label></div>
                <input type="text" id="inputFormat" class="hidden-field" placeholder="Table, List..." oninput="generatePrompt()">
                <div class="row-group"><input type="checkbox" id="checkTone" onchange="toggleField('checkTone', 'inputTone')"><label>Tone</label></div>
                <input type="text" id="inputTone" class="hidden-field" placeholder="Tone..." oninput="generatePrompt()">`;
        }
        generatePrompt();
    }

    function generatePrompt() {
        const role = document.getElementById('roleSelector').value;
        let p = "";
        const gS = (id, oId) => {
            const el = document.getElementById(id);
            if(!el) return "";
            return el.value === "Other" ? (getV(oId) || "[Custom]") : el.value;
        };

        if (role === "Other") {
            p = `Act as an expert ${getV('customRole') || "[Role]"}.\n\nBACKGROUND: ${getV('customContext')}\n\nYOUR TASK: ${getV('customTask')}`;
            if (isC('checkAudience')) p += `\n\nTARGET AUDIENCE: ${getV('inputAudience')}`;
            if (isC('checkFormat')) p += `\n\nOUTPUT FORMAT: ${getV('inputFormat')}`;
            if (isC('checkTone')) p += `\n\nTONE: ${getV('inputTone')}`;
            if (isC('checkConstraints')) p += `\n\nCONSTRAINTS: ${getV('inputConstraints')}`;
        } else if (role === "Translator") {
            p = `Act as a master Localization Expert and Translator. Translate from ${getV('sourceLang') || "[Source]"} to ${getV('targetLang') || "[Target]"}.\n\nSPECIFICATIONS:\n- Tone: ${gS('transTone', 'transToneOther')}\n- Material Type: ${gS('transMaterial', 'transMaterialOther')}\n- Context: ${getV('transContext')}\n\nSOURCE TEXT:\n"""\n${getV('transSource')}\n"""`;
        } else if (role === "Film Director") {
            p = `Act as a world-class Film Director. VISUAL SPECS:\n- Shot: ${gS('shotType', 'shotTypeOther')}\n- Movement: ${isC('camMoveCheck') ? getV('camMoveText') : "Static"}\n- Style: ${gS('aesthetic', 'aestheticOther')}\n\nSUBJECT & SETTING:\n- Action: ${getV('subjectAction')}\n- Setting: ${gS('setting', 'settingOther')}\n- Time: ${getV('timeOfDay', 'timeOther')}\n- Background: ${getV('bgDetails')}`;
            if (isC('audioCheck')) p += `\n\nAUDIO:\n- Dialogue: ${gS('dialogue', 'dialogueOther')}\n- Ambience: ${getV('ambient')}\n- Music: ${getV('music')}`;
            let negs = []; document.querySelectorAll('.neg-check:checked').forEach(c => negs.push(c.value)); if (isC('negOtherCheck')) negs.push(getV('negOtherInput')); if (negs.length > 0) p += `\n\nNEGATIVE PROMPT: ${negs.join(', ')}`;
        } else if (role === "Management Consultant") {
            const obj = getV('mcObjective');
            const frm = gS('mcFramework', 'mcFrameworkOther');
            const deliver = gS('mcDeliverable', 'mcDeliverableOther');
            const cond1 = getV('mcCond1'); const cond2 = getV('mcCond2');
            const label1 = document.getElementById('labelCond1') ? document.getElementById('labelCond1').innerText : "";
            const label2 = document.getElementById('labelCond2') ? document.getElementById('labelCond2').innerText : "";
            const taskMap = { "Market Analysis": "Analyze the current market landscape to identify growth opportunities and competitive threats.", "Profitability": "Perform a deep-dive profitability analysis to identify margin expansion levers and cost-saving opportunities.", "Market Entry": "Develop a comprehensive market entry strategy to ensure a successful and scalable launch.", "Operational Excellence": "Review current operations to optimize processes, remove bottlenecks, and improve organizational efficiency." };
            const taskInstruction = isC('checkCustomTask') ? getV('mcCustomTaskText') : (taskMap[obj] || "Provide strategic recommendations.");
            p = `Act as a Managing Partner at a top-tier global strategy consultancy.\n\nBUSINESS PROBLEM: \n${getV('mcContext') || "[No Context Provided]"}\n\nSTRATEGIC FOCUS:\n- Objective: ${obj}\n- Framework: ${frm}`;
            if (cond1) p += `\n- ${label1}: ${cond1}`; if (cond2) p += `\n- ${label2}: ${cond2}`;
            p += `\n\nYOUR TASK:\n${taskInstruction}\n\nOUTPUT FORMAT:\n- Deliverable: ${deliver}\n- Style: High-impact, executive tone.\n- Logic: MECE-compliant (Mutually Exclusive, Collectively Exhaustive).`;
        } else if (role === "Talent Acquisition Specialist") {
            const obj = gS('taObjective', 'taObjectiveOther');
            const taskInstruction = { "Create High-Impact Job Description": "Write a compelling, professional job description that attracts top-tier talent while filtering for the specified DNA.", "Draft Executive Outreach (Headhunting)": "Draft a persuasive, personalized outreach message for a headhunting campaign targeting high-level passive candidates.", "Generate Candidate Evaluation Rubric": "Design a structured candidate evaluation scorecard and behavioral interview rubric to ensure objective hiring." }[obj] || "Optimize talent strategy.";
            p = `Act as an expert Talent Acquisition Specialist and Executive Recruiter.\n\nPOSITION DETAILS:\n- Title: ${getV('taJobTitle') || "[Title]"}\n- Seniority: ${getV('taSeniority')}\n- Industry: ${getV('taIndustry')}\n\nCONTEXT & DNA:\n- Qualifications: ${getV('taQuals')}\n- Culture: ${gS('taCulture', 'taCultureOther')}`;
            if (isC('checkComp')) p += `\n- Compensation: ${getV('inputComp')}`;
            if (isC('checkLoc')) p += `\n- Location: ${getV('inputLoc')}`;
            if (isC('checkExtra')) p += `\n- Additional Info: ${getV('inputExtra')}`;
            p += `\n\nYOUR TASK:\n${taskInstruction}\n\nSTYLE SPECIFICATIONS:\n- Tone: ${gS('taTone', 'taToneOther')}\n- Standard: Top 1% Executive Recruitment standards.`;
        } else if (role === "Communication Coach") {
            const venue = gS('coachVenue', 'coachVenueOther');
            const goal = gS('coachGoal', 'coachGoalOther');
            let focusItems = []; document.querySelectorAll('.coach-focus:checked').forEach(c => focusItems.push(c.value));
            p = `Act as an elite Communication Coach and EQ Expert specializing in Executive Influence.\n\nVENUE/SETTING: ${venue}\nSTRATEGIC GOAL: ${goal}\nTARGET AUDIENCE: ${getV('coachAudience')}\n\nSITUATION & CONTEXT:\n${getV('coachSituation')}`;
            p += `\n\nYOUR TASK:\nProvide high-level coaching on how to handle this interaction with a ${gS('coachTone', 'coachToneOther')} tone.`;
            if (focusItems.length > 0) p += `\n\nCOACHING FOCUS AREAS:\n- ${focusItems.join('\n- ')}`;
        } else if (role === "Brand/Marketing Specialist") {
            const mandate = gS('brandMandate', 'brandMandateOther');
            const taskMap = {
                "Brand Positioning & Identity": "Define a cohesive brand identity, mission, and vision.",
                "Go-To-Market (GTM) Strategy": "Draft a comprehensive GTM strategy to capture market share.",
                "Email Conversion Sequence": "Develop a high-converting email sequence to move leads to sale.",
                "UVP (Unique Value Proposition)": "Craft a sharp, 1-sentence UVP that defines our edge.",
                "Content & Social Media Strategy": "Design an engagement-focused content strategy.",
                "Ad Campaign Creative Brief": "Develop a professional campaign brief for high performance."
            };
            p = `Act as a world-class Marketing Strategist and Brand Director from a top-tier global agency.\n\nSTRATEGIC MANDATE: ${mandate}\n\n`;
            
            const audActive = isC('checkAudDemo') || isC('checkAudGeo') || isC('checkAudPsy') || isC('checkAudPain') || isC('checkAudAware') || isC('checkAudOther');
            if (audActive) {
                p += `AUDIENCE PROFILE:\n`;
                if (isC('checkAudDemo')) p += `- Demographics: ${getV('inputAudDemo')}\n`;
                if (isC('checkAudGeo')) p += `- Geographic: ${getV('inputAudGeo')}\n`;
                if (isC('checkAudPsy')) p += `- Psychographics: ${getV('inputAudPsy')}\n`;
                if (isC('checkAudPain')) p += `- Pain Points: ${getV('inputAudPain')}\n`;
                if (isC('checkAudAware')) p += `- Awareness Level: ${getV('selectAudAware')}\n`;
                if (isC('checkAudOther')) p += `- Other Audience Info: ${getV('inputAudOther')}\n`;
                p += `\n`;
            }
            
            p += `OFFERING DESCRIPTION:\n${getV('brandDesc')}\n`;
            if (isC('checkUSP')) p += `\nUSP/UVP CONTEXT:\n${getV('inputUSP')}\n`;
            if (isC('checkCompetitors')) p += `\nKEY COMPETITORS: ${getV('inputCompetitors')}\n`;
            
            p += `\nYOUR TASK:\n${taskMap[mandate] || "Develop a high-impact marketing strategy."}\n\nDISTRIBUTION & TONE:\n- Primary Channel: ${gS('brandChannel', 'brandChannelOther')}\n- Tone of Voice: ${gS('brandTone', 'brandToneOther')}\n- Standards: Top 1% Global Marketing Agency Strategic Standards.`;
        }
        document.getElementById('output').innerText = p;
    }

    function copyPrompt() {
        const text = document.getElementById('output').innerText;
        const btn = document.querySelector('.copy-btn');
        const textArea = document.getElementById('tempCopyArea');
        textArea.value = text;
        textArea.select();
        document.execCommand('copy');
        btn.innerText = "COPIED!";
        btn.style.backgroundColor = "#FFFFFF";
        setTimeout(() => { btn.innerText = "COPY TO CLIPBOARD"; btn.style.backgroundColor = "var(--accent)"; }, 2000);
    }
    window.onload = renderRoleUI;
</script>
</body>
</html>
